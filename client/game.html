<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo Multiplayer - Visual</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .game-container {
            max-width: 1200px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 20px;
            backdrop-filter: blur(10px);
        }
        
        .header {
            text-align: center;
            margin-bottom: 20px;
        }
        
        .header h1 {
            margin: 0;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        
        .status {
            text-align: center;
            padding: 10px;
            border-radius: 5px;
            margin: 10px 0;
            font-weight: bold;
            font-size: 1.2em;
        }
        
        .status.waiting {
            background-color: rgba(255, 193, 7, 0.8);
            color: #333;
        }
        
        .status.playing {
            background-color: rgba(40, 167, 69, 0.8);
        }
        
        .status.your-turn {
            background-color: rgba(220, 53, 69, 0.8);
            animation: pulse 1s infinite;
        }
        
        @keyframes pulse {
            0% { opacity: 0.8; }
            50% { opacity: 1; }
            100% { opacity: 0.8; }
        }
        
        .game-area {
            display: flex;
            gap: 20px;
            margin: 20px 0;
        }
        
        .canvas-container {
            flex: 1;
            background: rgba(135, 206, 235, 0.8);
            border-radius: 10px;
            padding: 10px;
        }
        
        #gameCanvas {
            width: 100%;
            max-width: 800px;
            height: 400px;
            border: 2px solid #fff;
            border-radius: 8px;
            cursor: crosshair;
            background: linear-gradient(to bottom, #87CEEB 0%, #98FB98 100%);
        }
        
        .game-info {
            width: 300px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 20px;
        }
        
        .health-bars {
            margin-bottom: 20px;
        }
        
        .player-info {
            margin-bottom: 15px;
            padding: 10px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.1);
        }
        
        .player-info.current-player {
            background: rgba(255, 215, 0, 0.3);
            border: 2px solid gold;
        }
        
        .health-bar {
            width: 100%;
            height: 20px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 10px;
            overflow: hidden;
            margin-top: 5px;
        }
        
        .health-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff4444, #ffff44, #44ff44);
            transition: width 0.5s ease;
            border-radius: 10px;
        }
        
        .controls {
            margin-top: 20px;
        }
        
        .control-group {
            margin-bottom: 15px;
        }
        
        .control-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        
        .control-group input, .control-group button {
            width: 100%;
            padding: 8px;
            border: none;
            border-radius: 5px;
            font-size: 14px;
        }
        
        .control-group button {
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.2s;
        }
        
        .control-group button:hover:not(:disabled) {
            transform: translateY(-2px);
        }
        
        .control-group button:disabled {
            background: #666;
            cursor: not-allowed;
        }
        
        .connection-controls {
            margin-bottom: 20px;
            text-align: center;
        }
        
        .connection-controls input {
            padding: 8px 12px;
            border: none;
            border-radius: 5px;
            margin-right: 10px;
            width: 200px;
        }
        
        .connection-controls button {
            padding: 8px 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            margin: 0 5px;
        }
        
        .connect-btn {
            background: #28a745;
            color: white;
        }
        
        .disconnect-btn {
            background: #dc3545;
            color: white;
        }
        
        .messages {
            max-height: 200px;
            overflow-y: auto;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            padding: 10px;
            margin-top: 20px;
        }
        
        .message {
            margin: 5px 0;
            padding: 5px 8px;
            border-radius: 4px;
            font-size: 12px;
        }
        
        .message.info {
            background: rgba(23, 162, 184, 0.3);
        }
        
        .message.game {
            background: rgba(40, 167, 69, 0.3);
        }
        
        .message.error {
            background: rgba(220, 53, 69, 0.3);
        }
        
        .trajectory-info {
            margin-top: 10px;
            padding: 10px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 5px;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="header">
            <h1>🎯 Batalha de Artilharia</h1>
            <div class="connection-controls">
                <input type="text" id="serverUrl" value="ws://localhost:8765" placeholder="URL do servidor">
                <button id="connectBtn" class="connect-btn" onclick="connect()">Conectar</button>
                <button id="disconnectBtn" class="disconnect-btn" onclick="disconnect()" disabled>Desconectar</button>
            </div>
        </div>
        
        <div id="status" class="status waiting">
            Desconectado - Clique em Conectar para começar
        </div>
        
        <div class="game-area">
            <div class="canvas-container">
                <canvas id="gameCanvas" width="800" height="400"></canvas>
                <div class="trajectory-info">
                    <strong>Controles:</strong> Clique e arraste para mirar, solte para atirar | 
                    <span id="trajectoryInfo">Arraste o mouse para ver a trajetória</span>
                </div>
            </div>
            
            <div class="game-info">
                <div class="health-bars">
                    <div id="player1Info" class="player-info">
                        <strong>Jogador 1</strong>
                        <div>Vida: <span id="health1">100</span>/100</div>
                        <div class="health-bar">
                            <div id="healthBar1" class="health-fill" style="width: 100%"></div>
                        </div>
                    </div>
                    <div id="player2Info" class="player-info">
                        <strong>Jogador 2</strong>
                        <div>Vida: <span id="health2">100</span>/100</div>
                        <div class="health-bar">
                            <div id="healthBar2" class="health-fill" style="width: 100%"></div>
                        </div>
                    </div>
                </div>
                
                <div class="controls">
                    <div class="control-group">
                        <label>Ângulo: <span id="angleDisplay">45</span>°</label>
                        <input type="range" id="angleSlider" min="0" max="90" value="45">
                    </div>
                    <div class="control-group">
                        <label>Força: <span id="forceDisplay">75</span>%</label>
                        <input type="range" id="forceSlider" min="0" max="100" value="75">
                    </div>
                    <div class="control-group">
                        <button id="fireBtn" onclick="fireProjectile()" disabled>Aguardando...</button>
                    </div>
                </div>
                
                <div class="messages" id="messages">
                    <div class="message info">Log de mensagens...</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Game state
        let websocket = null;
        let connected = false;
        let playerId = null;
        let currentTurn = null;
        let gameStarted = false;
        let isMyTurn = false;
        
        // Canvas and drawing
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // Game objects
        let players = [
            { x: 100, y: 350, width: 40, height: 60, color: '#4CAF50', name: 'Jogador 1' },
            { x: 700, y: 350, width: 40, height: 60, color: '#F44336', name: 'Jogador 2' }
        ];
        
        let projectile = {
            x: 0, y: 0, vx: 0, vy: 0,
            radius: 5, color: '#FF9800',
            active: false, trail: []
        };
        
        // Mouse interaction
        let isDragging = false;
        let dragStart = { x: 0, y: 0 };
        let aimLine = { show: false, endX: 0, endY: 0 };
        
        // Initialize
        function init() {
            drawGame();
            updateSliders();
            
            // Slider events
            document.getElementById('angleSlider').addEventListener('input', updateSliders);
            document.getElementById('forceSlider').addEventListener('input', updateSliders);
            
            // Canvas mouse events
            canvas.addEventListener('mousedown', onMouseDown);
            canvas.addEventListener('mousemove', onMouseMove);
            canvas.addEventListener('mouseup', onMouseUp);
            canvas.addEventListener('mouseleave', onMouseLeave);
        }
        
        function updateSliders() {
            const angle = document.getElementById('angleSlider').value;
            const force = document.getElementById('forceSlider').value;
            document.getElementById('angleDisplay').textContent = angle;
            document.getElementById('forceDisplay').textContent = force;
            
            if (aimLine.show) {
                updateAimLine();
            }
        }
        
        function onMouseDown(e) {
            if (!isMyTurn || projectile.active) return;
            
            const rect = canvas.getBoundingClientRect();
            dragStart.x = e.clientX - rect.left;
            dragStart.y = e.clientY - rect.top;
            isDragging = true;
            aimLine.show = true;
        }
        
        function onMouseMove(e) {
            if (!isDragging || !isMyTurn) return;
            
            const rect = canvas.getBoundingClientRect();
            aimLine.endX = e.clientX - rect.left;
            aimLine.endY = e.clientY - rect.top;
            
            updateAimLine();
            drawGame();
        }
        
        function onMouseUp(e) {
            if (!isDragging || !isMyTurn) return;
            
            const rect = canvas.getBoundingClientRect();
            const endX = e.clientX - rect.left;
            const endY = e.clientY - rect.top;
            
            // Calculate angle and force from drag
            const player = players[playerId - 1];
            const dx = endX - dragStart.x;
            const dy = endY - dragStart.y;
            
            const distance = Math.sqrt(dx * dx + dy * dy);
            const angle = Math.atan2(-dy, dx) * 180 / Math.PI;
            const force = Math.min(100, distance * 0.5);
            
            // Update sliders
            document.getElementById('angleSlider').value = Math.max(0, Math.min(90, angle));
            document.getElementById('forceSlider').value = Math.max(0, Math.min(100, force));
            updateSliders();
            
            isDragging = false;
            aimLine.show = false;
            
            // Fire immediately
            setTimeout(() => fireProjectile(), 100);
            drawGame();
        }
        
        function onMouseLeave() {
            isDragging = false;
            aimLine.show = false;
            drawGame();
        }
        
        function updateAimLine() {
            const angle = parseFloat(document.getElementById('angleSlider').value);
            const force = parseFloat(document.getElementById('forceSlider').value);
            
            // Update trajectory info
            document.getElementById('trajectoryInfo').textContent = 
                `Ângulo: ${angle}° | Força: ${force}% | Alcance estimado: ${(force * 8).toFixed(0)}m`;
        }
        
        function drawGame() {
            // Clear canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Draw ground
            ctx.fillStyle = '#8B4513';
            ctx.fillRect(0, 380, canvas.width, 20);
            ctx.fillStyle = '#228B22';
            ctx.fillRect(0, 380, canvas.width, 5);
            
            // Draw players
            players.forEach((player, index) => {
                ctx.fillStyle = player.color;
                ctx.fillRect(player.x - player.width/2, player.y - player.height, player.width, player.height);
                
                // Draw player label
                ctx.fillStyle = 'white';
                ctx.font = '12px Arial';
                ctx.textAlign = 'center';
                ctx.fillText(player.name, player.x, player.y - player.height - 10);
                
                // Highlight current player
                if (currentTurn === index + 1) {
                    ctx.strokeStyle = '#FFD700';
                    ctx.lineWidth = 3;
                    ctx.strokeRect(player.x - player.width/2 - 2, player.y - player.height - 2, player.width + 4, player.height + 4);
                }
            });
            
            // Draw aim line
            if (aimLine.show && isMyTurn) {
                ctx.strokeStyle = '#FF0000';
                ctx.lineWidth = 2;
                ctx.setLineDash([5, 5]);
                ctx.beginPath();
                ctx.moveTo(dragStart.x, dragStart.y);
                ctx.lineTo(aimLine.endX, aimLine.endY);
                ctx.stroke();
                ctx.setLineDash([]);
            }
            
            // Draw projectile and trail
            if (projectile.active) {
                // Draw trail
                ctx.strokeStyle = 'rgba(255, 152, 0, 0.5)';
                ctx.lineWidth = 2;
                ctx.beginPath();
                for (let i = 0; i < projectile.trail.length - 1; i++) {
                    const point = projectile.trail[i];
                    if (i === 0) {
                        ctx.moveTo(point.x, point.y);
                    } else {
                        ctx.lineTo(point.x, point.y);
                    }
                }
                ctx.stroke();
                
                // Draw projectile
                ctx.fillStyle = projectile.color;
                ctx.beginPath();
                ctx.arc(projectile.x, projectile.y, projectile.radius, 0, Math.PI * 2);
                ctx.fill();
            }
        }
        
        function animateProjectile(angle, force) {
            const player = players[playerId - 1];
            
            // Setup projectile
            projectile.x = player.x;
            projectile.y = player.y - player.height / 2;
            projectile.vx = force * Math.cos(angle * Math.PI / 180) * 0.3;
            projectile.vy = -force * Math.sin(angle * Math.PI / 180) * 0.3;
            projectile.active = true;
            projectile.trail = [{ x: projectile.x, y: projectile.y }];
            
            // Animation loop
            function animate() {
                if (!projectile.active) return;
                
                // Update position
                projectile.x += projectile.vx;
                projectile.y += projectile.vy;
                projectile.vy += 0.5; // gravity
                
                // Add to trail
                projectile.trail.push({ x: projectile.x, y: projectile.y });
                if (projectile.trail.length > 20) {
                    projectile.trail.shift();
                }
                
                // Check bounds
                if (projectile.x < 0 || projectile.x > canvas.width || projectile.y > 380) {
                    projectile.active = false;
                    return;
                }
                
                drawGame();
                requestAnimationFrame(animate);
            }
            
            animate();
        }
        
        // WebSocket functions
        async function connect() {
            const serverUrl = document.getElementById('serverUrl').value;
            
            try {
                websocket = new WebSocket(serverUrl);
                
                websocket.onopen = function() {
                    connected = true;
                    document.getElementById('connectBtn').disabled = true;
                    document.getElementById('disconnectBtn').disabled = false;
                    updateStatus('Conectado - Aguardando oponente...', 'waiting');
                    addMessage('Conectado ao servidor!', 'info');
                };
                
                websocket.onmessage = function(event) {
                    const data = JSON.parse(event.data);
                    handleMessage(data);
                };
                
                websocket.onclose = function() {
                    connected = false;
                    gameStarted = false;
                    isMyTurn = false;
                    document.getElementById('connectBtn').disabled = false;
                    document.getElementById('disconnectBtn').disabled = true;
                    updateStatus('Desconectado', 'waiting');
                    updateFireButton();
                    addMessage('Desconectado do servidor', 'error');
                };
                
                websocket.onerror = function(error) {
                    addMessage(`Erro de conexão: ${error}`, 'error');
                    updateStatus('Erro de conexão', 'waiting');
                };
                
            } catch (error) {
                addMessage(`Erro ao conectar: ${error}`, 'error');
                updateStatus('Erro de conexão', 'waiting');
            }
        }
        
        function disconnect() {
            if (websocket) {
                websocket.close();
            }
        }
        
        function handleMessage(data) {
            addMessage(`Recebido: ${JSON.stringify(data)}`, 'info');
            
            switch (data.tipo) {
                case 'espera':
                    playerId = data.jogador_id;
                    updateStatus(`Você é o ${players[playerId-1].name} - Aguardando oponente...`, 'waiting');
                    break;
                    
                case 'inicio':
                    gameStarted = true;
                    currentTurn = data.turno_atual;
                    isMyTurn = (currentTurn === playerId);
                    updateStatus('Jogo iniciado!', 'playing');
                    updateHealth(data.vidas[1], data.vidas[2]);
                    updateFireButton();
                    updatePlayerHighlight();
                    addMessage('Jogo iniciado! Boa sorte!', 'game');
                    break;
                    
                case 'atualizacao':
                    updateHealth(data.vidas[1], data.vidas[2]);
                    currentTurn = data.turno_atual;
                    isMyTurn = (currentTurn === playerId);
                    updateFireButton();
                    updatePlayerHighlight();
                    addMessage(data.mensagem, 'game');
                    
                    if (data.dano_causado !== undefined) {
                        addMessage(`Dano: ${data.dano_causado} pts (${data.impacto.tipo})`, 'game');
                    }
                    
                    // Stop projectile animation
                    projectile.active = false;
                    drawGame();
                    break;
                    
                case 'fim_jogo':
                    gameStarted = false;
                    isMyTurn = false;
                    updateFireButton();
                    updateStatus(`Fim de jogo! Vencedor: ${players[data.vencedor-1].name}`, 'playing');
                    addMessage(`🎉 ${data.mensagem}`, 'game');
                    break;
                    
                case 'oponente_desconectou':
                    gameStarted = false;
                    isMyTurn = false;
                    updateFireButton();
                    updateStatus(`Você venceu! Oponente desconectou.`, 'playing');
                    addMessage(data.mensagem, 'game');
                    break;
                    
                case 'erro':
                    addMessage(`❌ Erro: ${data.mensagem}`, 'error');
                    break;
                    
                default:
                    addMessage(`Tipo desconhecido: ${data.tipo}`, 'error');
            }
        }
        
        function fireProjectile() {
            if (!connected || !gameStarted || !isMyTurn) {
                addMessage('Não é possível atirar agora', 'error');
                return;
            }
            
            const angle = parseInt(document.getElementById('angleSlider').value);
            const force = parseInt(document.getElementById('forceSlider').value);
            
            // Start visual animation
            animateProjectile(angle, force);
            
            // Send move to server
            const move = {
                tipo: 'jogada',
                angulo: angle,
                forca: force
            };
            
            websocket.send(JSON.stringify(move));
            addMessage(`🎯 Disparo: ${angle}° / ${force}%`, 'info');
            
            isMyTurn = false;
            updateFireButton();
        }
        
        function updateStatus(text, className) {
            const status = document.getElementById('status');
            status.textContent = text;
            status.className = `status ${className}`;
            
            if (isMyTurn) {
                status.className += ' your-turn';
            }
        }
        
        function updateHealth(health1, health2) {
            document.getElementById('health1').textContent = health1;
            document.getElementById('health2').textContent = health2;
            document.getElementById('healthBar1').style.width = `${health1}%`;
            document.getElementById('healthBar2').style.width = `${health2}%`;
        }
        
        function updateFireButton() {
            const btn = document.getElementById('fireBtn');
            
            if (!connected) {
                btn.textContent = 'Desconectado';
                btn.disabled = true;
            } else if (!gameStarted) {
                btn.textContent = 'Aguardando jogo...';
                btn.disabled = true;
            } else if (isMyTurn) {
                btn.textContent = '🔥 SUA VEZ - ATIRAR!';
                btn.disabled = false;
            } else {
                btn.textContent = 'Aguardando oponente...';
                btn.disabled = true;
            }
        }
        
        function updatePlayerHighlight() {
            document.getElementById('player1Info').classList.toggle('current-player', currentTurn === 1);
            document.getElementById('player2Info').classList.toggle('current-player', currentTurn === 2);
            drawGame();
        }
        
        function addMessage(text, type = 'info') {
            const messages = document.getElementById('messages');
            const message = document.createElement('div');
            message.className = `message ${type}`;
            message.textContent = `[${new Date().toLocaleTimeString()}] ${text}`;
            messages.appendChild(message);
            messages.scrollTop = messages.scrollHeight;
        }
        
        // Initialize when page loads
        window.addEventListener('load', init);
    </script>
</body>
</html>
