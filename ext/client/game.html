<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo em Rede - Batalha de Tanques</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f8ff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #333;
        }
        .game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: #fff;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            padding: 20px;
            border: 1px solid #ddd;
        }
        canvas {
            background-color: #d0e7f9;
            border-radius: 10px;
            border: 2px solid #a0c4e4;
        }
        .controls {
            display: flex;
            justify-content: space-around;
            align-items: center;
            width: 100%;
            padding: 15px;
            background-color: #f7f9fc;
            border-radius: 10px;
            margin-top: 15px;
        }
        .control-group {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .control-group label {
            font-weight: bold;
            margin-bottom: 5px;
            color: #555;
        }
        .control-group input {
            width: 80px;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 5px;
            text-align: center;
            font-size: 1em;
        }
        #fireBtn {
            padding: 12px 25px;
            font-size: 1.2em;
            font-weight: bold;
            color: #fff;
            background: linear-gradient(145deg, #ff4b2b, #ff416c);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(255, 65, 108, 0.3);
        }
        #fireBtn:disabled {
            background: #a9a9a9;
            cursor: not-allowed;
            box-shadow: none;
        }
        #fireBtn:not(:disabled):hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 65, 108, 0.4);
        }
        .status-bar {
            width: 100%;
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
        }
        .health-bar {
            width: 45%;
            text-align: center;
        }
        .health-bar label {
            font-weight: bold;
        }
        .health-bg {
            background-color: #e9ecef;
            border-radius: 10px;
            overflow: hidden;
            height: 25px;
            border: 1px solid #ccc;
        }
        .health-fill {
            height: 100%;
            background: linear-gradient(90deg, #28a745, #84fab0);
            width: 100%;
            transition: width 0.5s ease-in-out;
            border-radius: 8px 0 0 8px;
        }
        #messages {
            width: 100%;
            height: 60px;
            overflow-y: auto;
            border: 1px solid #ddd;
            padding: 10px;
            margin-top: 10px;
            border-radius: 10px;
            background: #f8f9fa;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="status-bar">
            <div class="health-bar">
                <label>Jogador 1 (Vida: <span id="health1">100</span>)</label>
                <div class="health-bg"><div id="healthBar1" class="health-fill"></div></div>
            </div>
            <div class="health-bar">
                <label>Jogador 2 (Vida: <span id="health2">100</span>)</label>
                <div class="health-bg"><div id="healthBar2" class="health-fill"></div></div>
            </div>
        </div>
        <canvas id="gameCanvas" width="800" height="400"></canvas>
        <div class="controls">
            <div class="control-group">
                <label for="angle">Ângulo</label>
                <input type="number" id="angle" min="0" max="90" value="45">
            </div>
            <button id="fireBtn" disabled>Aguardando...</button>
            <div class="control-group">
                <label for="force">Força</label>
                <input type="number" id="force" min="0" max="100" value="75">
            </div>
        </div>
        <div id="messages"></div>
    </div>

    <script>
        // --- WebSocket and Game State ---
        const ws = new WebSocket("ws://localhost:8765");
        let playerId = null;
        let currentTurn = null;
        let gameStarted = false;

        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);
            addMessage(`Recebido: ${data.tipo}`);
            handleServerMessage(data);
        };

        ws.onclose = () => {
            addMessage("Desconectado do servidor.", "error");
            updateFireButton(false, "Desconectado");
        };

        ws.onerror = () => {
            addMessage("Erro de conexão.", "error");
        };

        function handleServerMessage(data) {
            switch (data.tipo) {
                case 'espera':
                    playerId = data.jogador_id;
                    updateFireButton(false, "Aguardando Oponente");
                    break;
                case 'inicio':
                    playerId = playerId || data.jogador_id;
                    gameStarted = true;
                    currentTurn = data.turno_atual;
                    updateHealth(data.vidas[1], data.vidas[2]);
                    updateFireButton(currentTurn === playerId, "Sua Vez!");
                    break;
                case 'atualizacao':
                    currentTurn = data.turno_atual;
                    updateHealth(data.vidas[1], data.vidas[2]);
                    updateFireButton(currentTurn === playerId, "Sua Vez!");
                    if (data.impacto) {
                       animateProjectile(data.jogada, data.impacto.alcance);
                    }
                    addMessage(data.mensagem);
                    break;
                case 'fim_jogo':
                    gameStarted = false;
                    updateFireButton(false, `Jogador ${data.vencedor} Venceu!`);
                    addMessage(data.mensagem);
                    break;
                case 'erro':
                    addMessage(`Erro: ${data.mensagem}`, "error");
                    break;
            }
        }

        // --- UI Update Functions ---
        const fireBtn = document.getElementById('fireBtn');
        const angleInput = document.getElementById('angle');
        const forceInput = document.getElementById('force');
        const messagesDiv = document.getElementById('messages');

        function updateFireButton(enabled, text) {
            fireBtn.disabled = !enabled;
            fireBtn.textContent = text;
        }

        function updateHealth(p1Health, p2Health) {
            document.getElementById('health1').textContent = p1Health;
            document.getElementById('health2').textContent = p2Health;
            document.getElementById('healthBar1').style.width = `${p1Health}%`;
            document.getElementById('healthBar2').style.width = `${p2Health}%`;
        }

        function addMessage(text, type = 'info') {
            const msg = document.createElement('div');
            msg.textContent = `[${new Date().toLocaleTimeString()}] ${text}`;
            msg.style.color = type === 'error' ? 'red' : 'black';
            messagesDiv.appendChild(msg);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        fireBtn.onclick = () => {
            const angle = parseInt(angleInput.value, 10);
            const force = parseInt(forceInput.value, 10);
            
            if (isNaN(angle) || isNaN(force)) {
                addMessage("Ângulo e força devem ser números.", "error");
                return;
            }

            ws.send(JSON.stringify({
                tipo: 'jogada',
                angulo: angle,
                forca: force
            }));
            updateFireButton(false, "Aguardando...");
        };
        
        // --- Canvas Rendering Logic ---
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const CANVAS_WIDTH = canvas.width;
        const CANVAS_HEIGHT = canvas.height;
        
        const groundHeight = 30;
        const playerSize = { width: 40, height: 20 };
        const playerPositions = {
            1: { x: 50, y: CANVAS_HEIGHT - groundHeight - playerSize.height },
            2: { x: CANVAS_WIDTH - 50 - playerSize.width, y: CANVAS_HEIGHT - groundHeight - playerSize.height }
        };

        let projectile = null; // { x, y, vx, vy, path: [] }

        function drawGround() {
            ctx.fillStyle = '#6B8E23'; // Olive Drab
            ctx.fillRect(0, CANVAS_HEIGHT - groundHeight, CANVAS_WIDTH, groundHeight);
        }

        function drawPlayer(id) {
            const pos = playerPositions[id];
            ctx.fillStyle = id === 1 ? '#007bff' : '#dc3545'; // Blue and Red
            ctx.fillRect(pos.x, pos.y, playerSize.width, playerSize.height);
            // Turret
            ctx.fillStyle = id === 1 ? '#0056b3' : '#a71d2a';
            ctx.fillRect(pos.x + 10, pos.y - 10, 20, 10);
        }
        
        function drawProjectile() {
            if (!projectile) return;
            
            ctx.beginPath();
            ctx.arc(projectile.x, projectile.y, 5, 0, Math.PI * 2);
            ctx.fillStyle = '#333';
            ctx.fill();
        }

        function drawTrajectoryPreview() {
            if (currentTurn !== playerId) return;

            const angle = parseInt(angleInput.value, 10);
            const force = parseInt(forceInput.value, 10);
            const path = simulateTrajectory(angle, force);
            
            ctx.beginPath();
            ctx.strokeStyle = 'rgba(0, 0, 0, 0.3)';
            ctx.setLineDash([2, 4]);
            
            const startX = playerPositions[playerId].x + playerSize.width / 2;
            const startY = playerPositions[playerId].y;

            path.forEach(p => {
                const drawX = startX + p.x * (playerId === 1 ? 1 : -1);
                const drawY = startY - p.y;
                if (drawY > CANVAS_HEIGHT - groundHeight) return;
                ctx.lineTo(drawX, drawY);
            });
            
            ctx.stroke();
            ctx.setLineDash([]);
        }

        function gameLoop() {
            ctx.clearRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
            
            drawGround();
            drawPlayer(1);
            drawPlayer(2);
            
            drawTrajectoryPreview();
            
            if (projectile) {
                // Update projectile physics
                const gravity = 0.2;
                projectile.vx; 
                projectile.vy += gravity;
                projectile.x += projectile.vx;
                projectile.y += projectile.vy;
                
                drawProjectile();
                
                // Stop animation if it hits the ground or goes off-screen
                if (projectile.y > CANVAS_HEIGHT - groundHeight || projectile.x < 0 || projectile.x > CANVAS_WIDTH) {
                    projectile = null;
                }
            }

            requestAnimationFrame(gameLoop);
        }
        
        // --- Physics and Animation ---
        function simulateTrajectory(angle, force, steps = 100) {
            const angleRad = angle * (Math.PI / 180);
            const initialVelocity = force * 0.4; // Scaled for canvas
            const gravity = 9.8 * 0.05; // Scaled for canvas

            let vx = initialVelocity * Math.cos(angleRad);
            let vy = initialVelocity * Math.sin(angleRad);
            
            const path = [];
            for (let i = 0; i < steps; i++) {
                const t = i * 0.5;
                const x = vx * t;
                const y = vy * t - 0.5 * gravity * t * t;
                if (y < -groundHeight) break;
                path.push({ x, y });
            }
            return path;
        }

        function animateProjectile(jogada, actualRange) {
             const angleRad = jogada.angulo * (Math.PI / 180);
             const initialVelocity = jogada.forca * 0.4;
             const gravity = 0.2;

             const shooterId = jogada.jogador;
             const startPos = playerPositions[shooterId];
             
             projectile = {
                 x: startPos.x + playerSize.width / 2,
                 y: startPos.y,
                 vx: initialVelocity * Math.cos(angleRad) * (shooterId === 1 ? 1 : -1),
                 vy: -initialVelocity * Math.sin(angleRad)
             };
        }

        // Start the rendering loop
        gameLoop();
    </script>
</body>
</html>
